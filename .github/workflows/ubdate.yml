name: Update M3U

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate M3U
        env:
          KABLO_TOKEN: ${{ secrets.KABLO_TOKEN }}
        run: python Kabilttrek.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kablo_tv.m3u
          git diff --cached --quiet || git commit -m "chore: update M3U $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
